name: Deploy App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: sjtelebot.azurecr.io
  IMAGE_NAME: telegram-bot
  APP_NAME: telegram-translater-bot-sjsj
  RESOURCE_GROUP: rg-sj-tranlater-bot

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --build-arg APP_VERSION=$IMAGE_TAG -t $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG .
          docker tag $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG $ACR_LOGIN_SERVER/$IMAGE_NAME:latest
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:latest

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update App Service to SHA image
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config container set \
              --resource-group $RESOURCE_GROUP \
              --name $APP_NAME \
              --container-image-name $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}
            az webapp restart \
              --resource-group $RESOURCE_GROUP \
              --name $APP_NAME
